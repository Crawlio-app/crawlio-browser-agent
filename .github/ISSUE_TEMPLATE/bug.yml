name: Bug Report
description: Report a bug in Crawlio Agent
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Crawlio Agent Version
      description: "Run `npx crawlio-browser --version` to find this."
      placeholder: "1.5.6"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal set of steps to reproduce the issue.
      placeholder: |
        1. Connect to tab with `connect_tab`
        2. Run `execute` with code: `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Code
        - Claude Desktop
        - Cursor
        - Windsurf
        - VS Code (Cline)
        - ChatGPT Desktop
        - Codex CLI
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Include relevant environment details.
      placeholder: |
        - OS: macOS 15.3 / Windows 11 / Ubuntu 24.04
        - Node.js: v22.x
        - Chrome: 131.x
        - Mode: code / full / portal
      render: markdown
    validations:
      required: false
